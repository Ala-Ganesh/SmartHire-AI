<!DOCTYPE html>
<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Portfolio Assistant</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<div class="container mt-5">

<h2 class="text-center mb-4">AI Portfolio Assistant</h2>

<!-- FAQ Buttons -->

<div class="mb-3 text-center">

<button class="btn btn-outline-secondary btn-sm m-1" onclick="askFAQ('Who is Ala Ganesh?')">
Who is Ala Ganesh?
</button>

<button class="btn btn-outline-secondary btn-sm m-1" onclick="askFAQ('Tell me about your family')">
Family Background
</button>

<button class="btn btn-outline-secondary btn-sm m-1" onclick="askFAQ('Explain NutriSnap project')">
NutriSnap
</button>

<button class="btn btn-outline-secondary btn-sm m-1" onclick="askFAQ('What are your skills?')">
Skills
</button>

<button class="btn btn-outline-secondary btn-sm m-1" onclick="askFAQ('What are your career goals?')">
Career Goals
</button>

</div>

<!-- Chat Area -->

<div id="chatbox" class="chatbox">

<div class="ai-message">
<div class="ai-message">
Hello! I'm Ala Ganesh's AI portfolio assistant.  
You can ask about:
• Education  
• Skills  
• NutriSnap Project  
• Work Experience  
• Career Goals
</div>
</div>

</div>

<!-- SINGLE Input Box -->

<div class="input-group mt-3">

<input id="userInput" type="text" class="form-control" placeholder="Ask something about Ala Ganesh...">

<button class="btn btn-primary" onclick="sendMessage()">Send</button>

</div>

<br>

<a href="/" class="btn btn-dark">Back Home</a>

</div>

<script src="{{ url_for('static', filename='js/chatbot.js') }}"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
